# **************************************************************************
# * Kynex Sovereign - KynexOs Source Redirect CI v230.10
# * Geliştirici: Muhammed (Kynex)
# * Görev: Wallpaper'ı src/ klasöründen alır ve FFat imajına mühürler.
# * Hata Düzeltme: mkffat Symlink Hack + Source Path Redirect
# * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
# **************************************************************************

name: KynexOs Sovereign Build v230.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v230

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle ve Arac Onarimi
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio esptool
          pio pkg install --global --tool "platformio/tool-mkfatfs@~2.0.0"
          
          MKFATFS_PATH=$(find ~/.platformio/packages/tool-mkfatfs -name "mkfatfs" | head -n 1)
          sudo ln -sf "$MKFATFS_PATH" /usr/bin/mkffat
          echo "Arac koprusu kuruldu: $MKFATFS_PATH -> /usr/bin/mkffat"

      - name: KynexOs ve FFat Storage Hazirligi
        run: |
          # MUHAMMED: Dosyayı src/ altından alıp imaj klasörüne taşıyoruz
          mkdir -p data
          if [ -f "src/wallpaper.jpg" ]; then
            cp src/wallpaper.jpg data/wallpaper.jpg
            echo "Wallpaper src/ klasorunden kopyalandi."
          else
            echo "HATA: src/wallpaper.jpg bulunamadi!"
            exit 1
          fi
          
          # Firmware ve Dosya Sistemi Derlemesi
          pio run
          pio run --target buildfs

      - name: DIO Modunda Hibrit Core Olustur
        run: |
          python -m esptool --chip esp32s3 merge_bin \
            -o .pio/build/esp32-s3-devkitc-1/kynexos_core_dio.bin \
            --flash_mode dio \
            --flash_size 16MB \
            --flash_freq 40m \
            0x0 .pio/build/esp32-s3-devkitc-1/bootloader.bin \
            0x10000 .pio/build/esp32-s3-devkitc-1/firmware.bin

      - name: Sovereign Ultimate Pack Yukle
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Ultimate_Pack_v230
          path: |
            .pio/build/*/kynexos_core_dio.bin
            .pio/build/*/partitions.bin
            .pio/build/*/ffat.bin
          compression-level: 9
