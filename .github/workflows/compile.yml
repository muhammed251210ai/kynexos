name: KynexOs Sovereign Build v177.0

on: [push]

env:
  # MUHAMMED: GitHub Actions 2026 standartlarına uygun Node.js 24 ayarı
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v177

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle ve Arac Onarimi
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio
          # MUHAMMED: Eksik aracı (mkfatfs) zorla indiriyoruz
          pio pkg install --tool platformio/tool-mkfatfs
          # MUHAMMED: "mkffat: not found" hatasını çözmek için köprü kuruyoruz (Symlink Hack)
          MKFATFS_PATH=$(find ~/.platformio/packages/tool-mkfatfs -name "mkfatfs" | head -n 1)
          sudo ln -s "$MKFATFS_PATH" /usr/bin/mkffat
          echo "Arac kòprüsü kuruldu: $MKFATFS_PATH -> /usr/bin/mkffat"

      - name: KynexOs ve Storage Derle
        run: |
          # MUHAMMED: Once firmware, sonra data klasorunden FFat imajı üret!
          pio run
          pio run --target buildfs

      - name: KynexOs Ultimate Pack Yukle
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Final_Package_v177
          path: |
            .pio/build/esp32-s3-devkitc-1/firmware.bin
            .pio/build/esp32-s3-devkitc-1/partitions.bin
            .pio/build/esp32-s3-devkitc-1/bootloader.bin
            .pio/build/esp32-s3-devkitc-1/ffat.bin
          compression-level: 9
