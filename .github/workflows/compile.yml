name: KynexOs Turbo Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Yukle
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-pio

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Kur
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: KynexOs Derle
        run: pio run

      - name: Bin Dosyasini Paylas
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Firmware
          path: .pio/build/esp32-s3-devkitc-1/firmware.bin
