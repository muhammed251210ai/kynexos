# **************************************************************************
# * Kynex Sovereign - KynexOs Embedded Image CI v230.11
# * Geliştirici: Muhammed (Kynex)
# * Görev: Wallpaper'ı koda gömer, storage dosyasına ihtiyacı bitirir.
# * Hata Düzeltme: mkffat Symlink Hack + Image-to-Header Converter
# * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
# **************************************************************************

name: KynexOs Sovereign Build v230.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v230

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio esptool

      - name: Resmi Koda Gom (Image-to-Header)
        run: |
          # MUHAMMED: İşte o büyük dahi hamlesi! 
          # src/wallpaper.jpg dosyasını okuyup wallpaper_data.h olarak koda mühürlüyoruz.
          python3 -c "import sys; data = open('src/wallpaper.jpg', 'rb').read(); print('const unsigned char wallpaper_jpg[] PROGMEM = {', end=''); print(','.join([hex(b) for b in data]), end=''); print('};');" > src/wallpaper_data.h
          echo "Wallpaper koda muhurlendi: src/wallpaper_data.h"

      - name: KynexOs Derle
        run: |
          # Artık buildfs (storage) derlememize gerek yok!
          pio run

      - name: DIO Modunda Hibrit Core Olustur
        run: |
          python -m esptool --chip esp32s3 merge_bin \
            -o .pio/build/esp32-s3-devkitc-1/kynexos_core_dio.bin \
            --flash_mode dio \
            --flash_size 16MB \
            --flash_freq 40m \
            0x0 .pio/build/esp32-s3-devkitc-1/bootloader.bin \
            0x10000 .pio/build/esp32-s3-devkitc-1/firmware.bin

      - name: Sovereign Ultimate Embedded Pack Yukle
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Embedded_Pack_v230
          path: |
            .pio/build/*/kynexos_core_dio.bin
            .pio/build/*/partitions.bin
          compression-level: 9
