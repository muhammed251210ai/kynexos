name: KynexOs Sovereign Build v142.0

on: [push]

env:
  # MUHAMMED: GitHub Actions 2026 standartlarına uygun Node.js 24 ayarı
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v142

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle ve Derle
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio
          # MUHAMMED: Bu komut firmware.bin ve partitions.bin dosyalarini otomatik uretir
          pio run

      - name: KynexOs Sistem Dosyalarini Paketle (Firmware + Partitions)
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Complete_Package_v142
          # MUHAMMED: Burası çok kritik! Her iki dosyayı da tek ZIP içine alır.
          path: |
            .pio/build/esp32-s3-devkitc-1/firmware.bin
            .pio/build/esp32-s3-devkitc-1/partitions.bin
            .pio/build/esp32-s3-devkitc-1/bootloader.bin
          compression-level: 9
