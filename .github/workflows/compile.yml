name: KynexOs Sovereign Build v175.0

on: [push]

env:
  # MUHAMMED: GitHub Actions 2026 standartlarına uygun Node.js 24 ayarı
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v175

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle ve Derle
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio
          # MUHAMMED: Hem firmware'i derle hem de data klasöründen FFat imajı (storage.bin) üret!
          pio run
          pio run --target buildfs

      - name: KynexOs Sistem ve Storage Paketle (Complete Pack)
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Ultimate_Package_v175
          # MUHAMMED: Artık ffat.bin (Oyunlar ve Motorlar) dosyası da ZIP içinde!
          path: |
            .pio/build/esp32-s3-devkitc-1/firmware.bin
            .pio/build/esp32-s3-devkitc-1/partitions.bin
            .pio/build/esp32-s3-devkitc-1/bootloader.bin
            .pio/build/esp32-s3-devkitc-1/ffat.bin
          compression-level: 9
