# **************************************************************************
# * Kynex Sovereign - KynexOs Discrete CI v230.47
# * Geliştirici: Muhammed (Kynex)
# * Görev: Separate Bootloader, Partition and Firmware Artifacts
# * Değişiklik: Merge işlemi kaldırıldı, her bin dosyası bağımsız paketlendi.
# **************************************************************************

name: KynexOs Sovereign Build v230.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v230

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio esptool

      - name: KynexOs Derle
        run: pio run

      - name: Sovereign Discrete Pack Yukle
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Discrete_v230_47
          path: |
            .pio/build/esp32-s3-devkitc-1/bootloader.bin
            .pio/build/esp32-s3-devkitc-1/partitions.bin
            .pio/build/esp32-s3-devkitc-1/firmware.bin
          compression-level: 9
