# **************************************************************************
# * Kynex Sovereign - KynexOs Header Vision CI v230.21
# * Geliştirici: Muhammed (Kynex)
# * Görev: Saf Header (wallpaper.h) tabanlı derleme ve paketleme.
# * Hata Düzeltme: JPG Hafıza Boğulması ve Hizalama Sorunları Giderildi.
# * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
# **************************************************************************

name: KynexOs Sovereign Build v230.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v230

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio esptool

      - name: KynexOs Derle
        run: |
          # MUHAMMED: Artik JPG donusturme yok, dogrudan wallpaper.h kullaniliyor.
          pio run

      - name: DIO Modunda Hibrit Core Olustur
        run: |
          # MUHAMMED: Bootloader ve Firmware'i DIO modunda birlestiriyoruz.
          python -m esptool --chip esp32s3 merge_bin \
            -o .pio/build/esp32-s3-devkitc-1/kynexos_core_dio.bin \
            --flash_mode dio \
            --flash_size 16MB \
            --flash_freq 40m \
            0x0 .pio/build/esp32-s3-devkitc-1/bootloader.bin \
            0x10000 .pio/build/esp32-s3-devkitc-1/firmware.bin

      - name: Sovereign Final Pack Yukle
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Final_v230_21
          path: |
            .pio/build/*/kynexos_core_dio.bin
            .pio/build/*/partitions.bin
          compression-level: 9
