# **************************************************************************
# * Kynex Sovereign - KynexOs Modular CI v230.46
# * Geliştirici: Muhammed (Kynex)
# * Görev: Separate Partition Management & Modular Pack
# * Değişiklik: partitions.bin merge işleminden çıkarıldı, ayrı paketlendi.
# **************************************************************************

name: KynexOs Sovereign Build v230.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v230

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio esptool

      - name: KynexOs Derle
        run: pio run

      - name: Modular Pack Olustur (Partitions Ayri)
        run: |
          # MUHAMMED: Bootloader (0x0) ve Firmware (0x10000) birlesir.
          # partitions.bin (0x8000) bu dosyaya dahil edilmez, orijinal haliyle birakilir.
          python -m esptool --chip esp32s3 merge_bin \
            -o .pio/build/esp32-s3-devkitc-1/kynexos_core_v325.bin \
            --flash_mode dio \
            --flash_size 16MB \
            --flash_freq 40m \
            0x0 .pio/build/esp32-s3-devkitc-1/bootloader.bin \
            0x10000 .pio/build/esp32-s3-devkitc-1/firmware.bin

      - name: Sovereign Modular Pack Yukle
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Modular_v230_46
          path: |
            .pio/build/*/kynexos_core_v325.bin
            .pio/build/*/partitions.bin
          compression-level: 9
