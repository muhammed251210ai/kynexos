# **************************************************************************
# * Kynex Sovereign - KynexOs Mainframe CI v224.0
# * Geliştirici: Muhammed (Kynex)
# * Görev: KynexOs firmware'i ve Data (FFat) imajını tek hamlede derler.
# * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
# **************************************************************************

name: KynexOs Sovereign Build v224.0

on: [push]

env:
  # MUHAMMED: GitHub Actions 2026 standartlarına uygun Node.js 24 ayarı
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v224

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle ve Guncelle
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio
          # MUHAMMED: Symlink yerine global tool kurulumu çok daha kararlıdır.
          pio pkg install --global --tool platformio/tool-mkfatfs

      - name: KynexOs ve Storage Derle
        run: |
          # MUHAMMED: Once firmware, sonra data klasorunden FFat imajı üret!
          pio run
          pio run --target buildfs

      - name: KynexOs Ultimate Pack Yukle
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Final_Package_v224
          path: |
            .pio/build/*/firmware.bin
            .pio/build/*/partitions.bin
            .pio/build/*/bootloader.bin
            .pio/build/*/*.bin 
          compression-level: 9
