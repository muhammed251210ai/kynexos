name: KynexOs Sovereign Build v176.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v176

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle ve Derle
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio
          # MUHAMMED: mkfatfs hatasını engellemek için sembolik link oluşturuyoruz
          pio pkg install --tool platformio/tool-mkfatfs
          # Derleme ve İmaj oluşturma
          pio run
          pio run --target buildfs

      - name: KynexOs Ultimate Pack Yukle
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Complete_v176
          path: |
            .pio/build/esp32-s3-devkitc-1/firmware.bin
            .pio/build/esp32-s3-devkitc-1/partitions.bin
            .pio/build/esp32-s3-devkitc-1/bootloader.bin
            .pio/build/esp32-s3-devkitc-1/ffat.bin
          compression-level: 9
