name: KynexOs Sovereign Build v141.0

on: [push]

env:
  # MUHAMMED: GitHub'ın istediği kritik Node.js 24 geçiş anahtarı buraya eklendi.
  # Bu satır, kullandığın tüm eylemleri Node 24 motoruyla çalışmaya zorlar.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v141-node24

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle ve Derle
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio
          pio run

      - name: Bin Dosyasini Paylas
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Firmware_Immortal
          path: .pio/build/esp32-s3-devkitc-1/firmware.bin
          compression-level: 0
