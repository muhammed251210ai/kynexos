# **************************************************************************
# * Kynex Sovereign - KynexOs Factory Merger CI v230.5
# * Geliştirici: Muhammed (Kynex)
# * Görev: Tüm binary parçalarını (Boot+Part+App) TEK DOSYA haline getirir.
# * Hata Düzeltme: mkffat Symlink Hack + Esptool Merge Binary
# * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
# **************************************************************************

name: KynexOs Sovereign Build v230.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v230

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle ve Arac Onarimi
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio esptool
          pio pkg install --global --tool "platformio/tool-mkfatfs@~2.0.0"
          
          MKFATFS_PATH=$(find ~/.platformio/packages/tool-mkfatfs -name "mkfatfs" | head -n 1)
          sudo ln -sf "$MKFATFS_PATH" /usr/bin/mkffat
          echo "Arac koprusu kuruldu: $MKFATFS_PATH -> /usr/bin/mkffat"

      - name: KynexOs ve Storage Derle
        run: |
          pio run
          pio run --target buildfs

      - name: Binary Dosyalarini Tek Parca Haline Getir (Merge)
        run: |
          # MUHAMMED: İşte o sihirli an! 0x0, 0x8000 ve 0x10000 adreslerini birleştiriyoruz.
          python -m esptool --chip esp32s3 merge_bin \
            -o .pio/build/esp32-s3-devkitc-1/kynexos_factory_v230.bin \
            --flash_mode qio \
            --flash_size 16MB \
            0x0 .pio/build/esp32-s3-devkitc-1/bootloader.bin \
            0x8000 .pio/build/esp32-s3-devkitc-1/partitions.bin \
            0x10000 .pio/build/esp32-s3-devkitc-1/firmware.bin

      - name: KynexOs Sovereign Pack Yukle
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Single_Pack_v230
          path: |
            .pio/build/*/kynexos_factory_v230.bin
            .pio/build/*/littlefs.bin
            .pio/build/*/fatfs.bin
          compression-level: 9
