# **************************************************************************
# * Kynex Sovereign - KynexOs Raw Vision CI v230.18
# * Geliştirici: Muhammed (Kynex)
# * Görev: src/wallpaper.jpg dosyasını hizalanmış byte dizisine dönüştürür.
# * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
# **************************************************************************

name: KynexOs Sovereign Build v230.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v230

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio esptool

      - name: Hizalanmiş Resim Muhru (Image-to-Header Aligned)
        run: |
          # MUHAMMED: Işlemcinin çökmemesi için veriyi 4-byte hizali (aligned) olarak gömüyoruz.
          python3 -c "
          import sys
          try:
              with open('src/wallpaper.jpg', 'rb') as f:
                  data = f.read()
              with open('src/wallpaper_data.h', 'w') as f:
                  f.write('#include <pgmspace.h>\n')
                  f.write('const unsigned char wallpaper_jpg[] PROGMEM __attribute__((aligned(4))) = {\n')
                  for i in range(0, len(data), 12):
                      chunk = data[i:i+12]
                      f.write('  ' + ', '.join([hex(b) for b in chunk]) + ',\n')
                  f.write('};\n')
                  f.write('const unsigned int wallpaper_jpg_len = ' + str(len(data)) + ';\n')
              print('Wallpaper basariyla muhurlendi.')
          except Exception as e:
              print('HATA: ' + str(e))
              sys.exit(1)
          "

      - name: KynexOs Derle
        run: pio run

      - name: DIO Modunda Hibrit Core Olustur
        run: |
          python -m esptool --chip esp32s3 merge_bin \
            -o .pio/build/esp32-s3-devkitc-1/kynexos_core_dio.bin \
            --flash_mode dio \
            --flash_size 16MB \
            --flash_freq 40m \
            0x0 .pio/build/esp32-s3-devkitc-1/bootloader.bin \
            0x10000 .pio/build/esp32-s3-devkitc-1/firmware.bin

      - name: Sovereign Final Pack Yukle
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Final_v230_18
          path: |
            .pio/build/*/kynexos_core_dio.bin
            .pio/build/*/partitions.bin
          compression-level: 9
