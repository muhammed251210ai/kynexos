# **************************************************************************
# * Kynex Sovereign - KynexOs Hybrid Builder CI v230.45
# * Geliştirici: Muhammed (Kynex)
# * Görev: 40MHz/DIO Dönüştürme ve Partition Tablosu Entegrasyonu
# * Hata Düzeltme: Merge işlemine 0x8000 adresindeki partition.bin eklendi.
# **************************************************************************

name: KynexOs Sovereign Build v230.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v230

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio esptool

      - name: KynexOs Derle
        run: pio run

      - name: DIO/40MHz Modunda Full Core Olustur
        run: |
          # MUHAMMED: Burası cihazının beynidir. 
          # Bootloader, Partition Table ve Firmware'i tek bir 'dio' dosyasında topluyoruz.
          python -m esptool --chip esp32s3 merge_bin \
            -o .pio/build/esp32-s3-devkitc-1/kynexos_master_dio.bin \
            --flash_mode dio \
            --flash_size 16MB \
            --flash_freq 40m \
            0x0 .pio/build/esp32-s3-devkitc-1/bootloader.bin \
            0x8000 .pio/build/esp32-s3-devkitc-1/partitions.bin \
            0x10000 .pio/build/esp32-s3-devkitc-1/firmware.bin

      - name: Sovereign Final Pack Yukle
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Sovereign_V325_Pack
          path: |
            .pio/build/*/kynexos_master_dio.bin
          compression-level: 9
