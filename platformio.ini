; **************************************************************************
; * Kynex Sovereign - PlatformIO Engine v230.0
; * Geliştirici: Muhammed (Kynex)
; * Board: ESP32-S3 N16R8 (16MB Flash / 8MB PSRAM)
; * Dosya Sistemi: FFat (Flash Fat)
; * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
; **************************************************************************

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; MUHAMMED: Bellek ve Flaş Hızı Ayarları (N16R8 için QIO OPI)
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 16MB

; MUHAMMED: Hafıza Haritası ve Dosya Sistemi Seçimi
board_build.partitions = partitions.csv
board_build.filesystem = ffat

; MUHAMMED: Sovereign Masterpiece Kütüphane Zinciri
lib_deps =
    https://github.com/adafruit/Adafruit_ILI9341.git
    https://github.com/adafruit/Adafruit-GFX-Library.git
    https://github.com/bodmer/TJpg_Decoder.git
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    https://github.com/adafruit/Adafruit_BusIO.git

; MUHAMMED: Donanım ve USB Hükümdarlık Bayrakları
build_flags = 
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=0

; Monitör filtreleri ile temiz çıktı alalım
monitor_filters = esp32_exception_decoder, time
