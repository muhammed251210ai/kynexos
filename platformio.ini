# **************************************************************************
# * Kynex Sovereign - KynexOs Discrete CI v230.47
# * Geliştirici: Muhammed (Kynex)
# * Görev: Separate Bootloader, Partition, Firmware and Music Artifacts
# * Değişiklik: FAT16 zorlamasi kaldirildi, ESP32 uyumlu Auto-FAT (FAT12) yapildi!
# **************************************************************************

name: KynexOs Sovereign Build v230.0

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Cek
        uses: actions/checkout@v4

      - name: PlatformIO Onbellegini Kur
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-platformio-v230

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: PlatformIO Yukle
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio esptool

      - name: KynexOs Kutuphane Zaman Makinesi (Audio Fix)
        run: |
          mkdir -p lib
          cd lib
          git clone https://github.com/schreibfaul1/ESP32-audioI2S.git
          cd ESP32-audioI2S
          # MUHAMMED: Kutuphanenin tam olarak 1 Kasim 2023'teki hatasiz haline donus yapiyoruz!
          git checkout $(git rev-list -n 1 --before="2023-11-01 00:00" HEAD)

      - name: KynexOs Derle
        run: pio run

      - name: Music.bin Olustur (FFAT)
        run: |
          sudo apt-get update
          sudo apt-get install -y mtools dosfstools
          mkdir -p music
          # Partitions.csv icindeki 0x7A0000 boyutuna (7808 KB) tam esit bos disk imaji olustur
          dd if=/dev/zero of=music.bin bs=1024 count=7808
          # MUHAMMED: "-F 16" silindi! Sistem 7.6MB'a uygun olan FAT12'yi kendi sececek.
          mkfs.fat music.bin
          mmd -i music.bin ::/music
          mcopy -i music.bin music/* ::/music/ || true

      - name: Sovereign Discrete Pack Yukle
        uses: actions/upload-artifact@v4
        with:
          name: KynexOs_Discrete_v230_47
          path: |
            .pio/build/esp32-s3-devkitc-1/bootloader.bin
            .pio/build/esp32-s3-devkitc-1/partitions.bin
            .pio/build/esp32-s3-devkitc-1/firmware.bin
            music.bin
          compression-level: 9
