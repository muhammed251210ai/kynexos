; **************************************************************************
; * KynexOs v105.0 - The Hybrid Sovereign (Nihai Kararlı Sürüm)
; * Geliştirici: Muhammed (Klynex)
; * Donanım: ESP32-S3 N16R8 (Flash: DIO, RAM: OPI)
; * Talimat: Asla satır silme, optimize etme, sadeleştirme yapma.
; **************************************************************************

[env:esp32-s3-devkitc-1]
platform = espressif32 @ 6.5.0
board = esp32-s3-devkitc-1
framework = arduino

; --- ⚡ TEST EDİLMİŞ VE ONAYLANMIŞ DONANIM DNA'SI ---
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio         ; 👈 ZAFERİ GETİREN AYAR (Flash DIO)
board_upload.flash_size = 16MB
board_build.psram = enabled
board_build.arduino.memory_type = dio_opi ; 👈 ZAFERİ GETİREN AYAR (RAM OPI)

; --- 🗺️ STORAGE & WALLPAPER ---
board_build.partitions = partitions.csv
board_build.embed_files = src/my_wallpaper.jpg

; --- 📂 LIBRARIES ---
lib_deps =
    Adafruit ILI9341
    Adafruit GFX Library
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    TJpg_Decoder
    WiFi
    WebServer
    FS
    FFat

; --- 🛠️ BUILD FLAGS (TAM FONKSİYONEL) ---
build_flags = 
    -D CORE_DEBUG_LEVEL=0
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; Ekran ve Ses Pinleri (GÜVENLİ VE KALICI ŞEMA)
    -D TFT_BL=48
    -D SPEAKER_PIN=45 
    -D TFT_CS=10    
    -D TFT_DC=9     
    -D TFT_RST=14   
    -D TFT_MOSI=11  
    -D TFT_SCK=12   
    -D TOUCH_CS=15  
    -D MISO_PIN=13  
    ; Joystick Pinleri
    -D JOY1_X=4
    -D JOY1_Y=6
    -D JOY1_SW=7
    -D JOY2_X=8
    -D JOY2_Y=15
    -D JOY2_SW=16
    -D BTN_EXTRA=17

monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder