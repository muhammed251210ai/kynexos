; **************************************************************************
; * Kynex Sovereign - Master PlatformIO Configuration v229.0
; * Geliştirici: Muhammed (Kynex)
; * Donanım: ESP32-S3 N16R8 (16MB Flash)
; * Hata Düzeltme: XPT2046_Touchscreen Registry Error (Direct Git URL Fix)
; * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
; **************************************************************************

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; HAFIZA VE HARİTA AYARLARI
board_build.partitions = partitions.csv
board_build.filesystem = ffat
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

; SERİ PORT HIZI
monitor_speed = 115200

; PLATFORMIO PACKAGE OVERRIDE (mkfatfs hatası kesin çözümü)
platform_packages =
    tool-mkfatfs@~2.0.0

; MUHAMMED: İŞTE EKSİK OLAN KÜTÜPHANELER!
; Adafruit GFX, ILI9341 ve XPT2046 doğrudan GitHub'dan çekilerek sisteme eklendi.
lib_deps = 
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit ILI9341 @ ^1.3.3
    adafruit/Adafruit BusIO @ ^1.16.1
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    SPI
    Wire
