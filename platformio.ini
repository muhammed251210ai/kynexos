; * Hata Çözümü: Bootloader Not Found FIX + ets_loader Loop FIX
; * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
; **************************************************************************

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; MUHAMMED: Derleme hatasını çözmek için standart QIO_OPI moduna döndük
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.f_flash = 40000000L           ; 40MHz hızda bırakıyoruz (Stabilite için)
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv

lib_deps =
    https://github.com/adafruit/Adafruit_ILI9341.git
    https://github.com/adafruit/Adafruit-GFX-Library.git
    https://github.com/bodmer/TJpg_Decoder.git
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    https://github.com/adafruit/Adafruit_BusIO.git

build_flags = 
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=0
    ; Flash voltajını ve kararlılığını zorlayan bayraklar
    -D CONFIG_ESP32S3_FLASH_VOLTAGE_3_3V
    -D CONFIG_ESP32S3_SPIRAM_SUPPORT=1
