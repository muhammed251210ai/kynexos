; **************************************************************************
; * Kynex Sovereign - Master PlatformIO Configuration v226.0
; * Geliştirici: Muhammed (Kynex)
; * Donanım: ESP32-S3 N16R8 (16MB Flash)
; * Hata Düzeltme: mkfatfs 2.20000.0 UnknownPackageError Override
; * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
; **************************************************************************

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; HAFIZA VE HARİTA AYARLARI
board_build.partitions = partitions.csv
board_build.filesystem = ffat
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

; SERİ PORT HIZI
monitor_speed = 115200

; MUHAMMED: İŞTE KİLİDİ KIRAN KOD BURASI!
; PlatformIO'nun bulamadığı 2.20000.0 sürümünü atlayıp, sunucuda var olan stabil sürümü zorla indirtiyoruz.
platform_packages =
    tool-mkfatfs@~2.0.0

; EĞER KÜTÜPHANE EKLERSEN BURAYA YAZABİLİRSİN
lib_deps = 
    ; buraya kütüphaneler eklenebilir
