; **************************************************************************
; * Kynex Sovereign - PlatformIO Engine v230.2 (DIO Mode)
; * Geliştirici: Muhammed (Kynex)
; * Board: ESP32-S3 N16R8 (DIO Stabilized)
; * Talimat: Asla satır silmeden, tam ve tek parça kod blokları içinde ver.
; **************************************************************************

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; MUHAMMED: N16R8 için DIO ve 40MHz Stabilizasyonu
board_build.arduino.memory_type = qio_opi ; PSRAM hala OPI kullanabilir
board_build.flash_mode = dio              ; FLAŞ MODU DIO OLARAK DEĞİŞTİ
board_build.f_flash = 40000000L           ; 40MHz en güvenli hız
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv

lib_deps =
    https://github.com/adafruit/Adafruit_ILI9341.git
    https://github.com/adafruit/Adafruit-GFX-Library.git
    https://github.com/bodmer/TJpg_Decoder.git
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    https://github.com/adafruit/Adafruit_BusIO.git

build_flags = 
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=0
